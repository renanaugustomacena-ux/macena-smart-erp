---
# ---------------------------------------------------------------------------
# Sealed-secret template. The real values must be supplied through an
# ExternalSecrets / sealed-secrets / vault-csi operator at deploy time —
# NEVER commit populated secrets to git. The placeholders below are
# intentionally empty and Kubernetes will reject them on apply unless they
# are replaced by the secret operator.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: smarterp-secrets
  namespace: smarterp
type: Opaque
stringData:
  DB_USERNAME: "REPLACE_VIA_EXTERNAL_SECRETS"
  DB_PASSWORD: "REPLACE_VIA_EXTERNAL_SECRETS"
  DB_SSL_CA: ""
  REDIS_PASSWORD: "REPLACE_VIA_EXTERNAL_SECRETS"
  JWT_SECRET: "REPLACE_VIA_EXTERNAL_SECRETS"
  JWT_REFRESH_SECRET: "REPLACE_VIA_EXTERNAL_SECRETS"
  # Italian fiscal-SDI intermediary credentials (FatturaFlow, DocFisco, etc.)
  SDI_INTERMEDIARY_URL: ""
  SDI_INTERMEDIARY_API_KEY: "REPLACE_VIA_EXTERNAL_SECRETS"
  # PII field-level encryption key (AES-256-GCM, base64 32 bytes)
  PII_ENCRYPTION_KEY: "REPLACE_VIA_EXTERNAL_SECRETS"
