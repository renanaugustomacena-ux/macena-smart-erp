---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smarterp-config
  namespace: smarterp
data:
  APP_ENV: "production"
  APP_VERSION: "1.0.0"
  DB_HOST: "smarterp-postgres.smarterp.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "smarterp"
  DB_SCHEMA: "public"
  DB_POOL_MAX: "20"
  DB_POOL_MIN: "5"
  DB_SSL_REJECT_UNAUTHORIZED: "true"
  REDIS_HOST: "smarterp-redis.smarterp.svc.cluster.local"
  REDIS_PORT: "6379"
  CORS_ORIGIN: "https://app.smarterp.it,https://www.smarterp.it"
  THROTTLE_TTL: "60000"
  THROTTLE_LIMIT: "120"
  CACHE_TTL: "300"
  CACHE_MAX_ITEMS: "5000"
  JWT_ACCESS_TTL: "15m"
  JWT_REFRESH_TTL: "7d"
  OTEL_SERVICE_NAME: "smarterp-backend"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4318"
  LOG_LEVEL: "info"
