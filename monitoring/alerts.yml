# Prometheus / Alertmanager rules for SmartERP.
# Loaded via `rule_files:` in prometheus.yml and routed through
# Alertmanager to on-call PagerDuty / Slack.
#
# Closes gap D-11 (Alertmanager rules ABSENT).

groups:
  - name: smarterp-slo
    interval: 30s
    rules:
      - alert: SmarterpBackendDown
        expr: up{job="smarterp-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: smarterp
        annotations:
          summary: "SmartERP backend is DOWN"
          description: "One or more smarterp-backend instances have been unreachable for 2 minutes."
          runbook: "https://smarterp.it/runbook#backend-down"

      - alert: SmarterpErrorRateHigh
        expr: |
          (
            sum(rate(smarterp_http_errors_total{status=~"5.."}[5m]))
            / sum(rate(smarterp_http_requests_total[5m]))
          ) > 0.01
        for: 10m
        labels:
          severity: high
          service: smarterp
        annotations:
          summary: "SmartERP 5xx error rate > 1% for 10 minutes"
          description: "Current 5xx rate: {{ $value | humanizePercentage }}. SLO is 99% success."

      - alert: SmarterpLatencyP95High
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(smarterp_http_request_duration_seconds_bucket[5m]))
          ) > 0.4
        for: 10m
        labels:
          severity: high
          service: smarterp
        annotations:
          summary: "SmartERP P95 latency > 400ms for 10 minutes"
          description: "v2.0 §20.10 performance target (P95 < 200ms list / < 400ms aggregate) is breached."

      - alert: SmarterpReadinessFailing
        expr: probe_success{job="blackbox-ready", instance=~".*/api/ready"} == 0
        for: 3m
        labels:
          severity: critical
          service: smarterp
        annotations:
          summary: "Readiness probe failing"
          description: "/api/ready is not returning ready for 3+ minutes — dependency likely down."

  - name: smarterp-resources
    rules:
      - alert: SmarterpCpuSaturation
        expr: |
          avg by (pod) (
            rate(container_cpu_usage_seconds_total{namespace="smarterp"}[2m])
          ) > 0.8
        for: 10m
        labels:
          severity: warning
          service: smarterp
        annotations:
          summary: "SmartERP pod CPU saturation > 80%"
          description: "Pod {{ $labels.pod }} sustained > 80% CPU for 10 minutes; HPA should be scaling."

      - alert: SmarterpMemorySaturation
        expr: |
          (
            container_memory_working_set_bytes{namespace="smarterp"}
            / container_spec_memory_limit_bytes{namespace="smarterp"}
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          service: smarterp
        annotations:
          summary: "SmartERP pod memory > 85% of limit"
          description: "Risk of OOMKill on pod {{ $labels.pod }}. Check for memory leak or raise limit."

      - alert: SmarterpDbConnectionsExhausted
        expr: pg_stat_activity_count{datname="smarterp"} > 80
        for: 5m
        labels:
          severity: high
          service: smarterp
        annotations:
          summary: "SmartERP Postgres > 80 active connections"
          description: "Pool exhaustion risk. max=100. Check for runaway queries or leaked client."

  - name: smarterp-queues
    rules:
      - alert: SmarterpQueueStuck
        expr: |
          rate(smarterp_queue_jobs_total{outcome="failure"}[10m])
          > 0.5
        for: 10m
        labels:
          severity: high
          service: smarterp
        annotations:
          summary: "BullMQ queue failure rate > 0.5/s"
          description: "Queue {{ $labels.queue }} is failing jobs. Investigate processor logs."
